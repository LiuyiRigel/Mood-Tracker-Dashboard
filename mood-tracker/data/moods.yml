# 示例数据格式 (YAML)
# 用于 Jekyll 项目
# 位置: _data/moods.yml

# 最小数据示例
- date: "2026-01-01"
  m: 3.5
  a: 2.0

- date: "2026-01-02"
  m: 3.2
  a: 1.8

- date: "2026-01-03"
  m: 3.8
  a: 2.2

- date: "2026-01-04"
  m: 2.9
  a: 3.1
  note: "challenging day"

- date: "2026-01-05"
  m: 4.0
  a: 1.5
  note: "good mood, felt clear"

- date: "2026-01-06"
  m: 3.6
  a: 2.7

- date: "2026-01-07"
  m: 3.4
  a: 2.5

- date: "2026-01-08"
  m: 2.8
  a: 3.5
  note: "stressed, drank more"

- date: "2026-01-09"
  m: 3.1
  a: 2.0

- date: "2026-01-10"
  m: 3.9
  a: 1.8

# 数据说明：
# date: 日期（必需），格式 YYYY-MM-DD
# m: mood 心情分数（必需），1-5 分或小数如 3.5
# a: alcohol (或其他指标) 分数（必需），1-5 分或小数如 2.3
# note: 备注（可选），可以在 Tooltip 中显示

# 完整一年数据应该有 365 条（或闰年 366 条）
# 可以省略没有数据的日期，仪表板会显示空白

# 颜色映射说明：
# 心情高 + 指标低 = 浅色（好的状态）
# 心情低 + 指标高 = 深色（差的状态）
# 这样能直观显示两个指标的关系
